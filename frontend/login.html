<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--espresso:#1C1410;--cream:#FAF7F2;--terracotta:#C4704B;--terracotta-hover:#A85D3C;--card:#FFFFFF;--border:#E8E0D6;--text-dark:#2C2420;--text-muted:#8B7D72;--text-light:#B5A99A;--shadow-md:0 4px 20px rgba(28,20,16,.08);--radius-sm:8px;--radius-lg:20px;--radius-full:9999px;--font-heading:'Syne',sans-serif;--font-body:'Inter',sans-serif;--transition:.3s cubic-bezier(.25,.46,.45,.94)}
        body{font-family:var(--font-body);background:var(--cream);color:var(--text-dark);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .login-container{width:100%;max-width:420px}
        .login-header{text-align:center;margin-bottom:32px}
        .login-logo{font-family:var(--font-heading);font-size:1.5rem;font-weight:800;letter-spacing:.08em;color:var(--espresso);margin-bottom:8px}
        .login-title{font-family:var(--font-heading);font-size:1.75rem;font-weight:700;color:var(--espresso);margin-bottom:8px}
        .login-subtitle{font-size:.9375rem;color:var(--text-muted);font-weight:300}
        .login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;box-shadow:var(--shadow-md)}
        .card-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;color:var(--terracotta);background:rgba(196,112,75,.1)}
        .form-group{margin-bottom:20px}
        .form-label{display:block;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
        .form-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.9375rem;color:var(--text-dark);background:var(--cream);transition:border-color var(--transition),box-shadow var(--transition);outline:none}
        .form-input:focus{border-color:var(--terracotta);box-shadow:0 0 0 3px rgba(196,112,75,.12)}
        .form-input::placeholder{color:var(--text-light)}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border-radius:var(--radius-full);font-size:.875rem;font-weight:600;letter-spacing:.02em;transition:all var(--transition);cursor:pointer;border:none;font-family:inherit;background:var(--terracotta);color:#fff;width:100%}
        .btn:hover{background:var(--terracotta-hover);transform:scale(1.02)}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .login-footer{text-align:center;margin-top:24px}
        .login-footer p{font-size:.875rem;color:var(--text-muted)}
        .login-footer a{color:var(--terracotta);font-weight:600;text-decoration:none}
        .back-link{display:inline-flex;align-items:center;gap:6px;font-size:.875rem;color:var(--text-muted);text-decoration:none;margin-bottom:24px;transition:color var(--transition)}
        .back-link:hover{color:var(--espresso)}
        .toast-container{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:4000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
        .toast{background:var(--espresso);color:#fff;padding:12px 24px;border-radius:var(--radius-full);font-size:.8125rem;font-weight:500;box-shadow:0 12px 40px rgba(28,20,16,.12);opacity:0;transform:translateY(20px);transition:all .35s ease;display:flex;align-items:center;gap:8px}
        .toast--visible{opacity:1;transform:translateY(0)}
        .toast iconify-icon{color:var(--terracotta)}
    </style>
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="back-link"><iconify-icon icon="lucide:arrow-left" width="16"></iconify-icon> Back to Home</a>
        <div class="login-header">
            <div class="login-logo">STUDIO 01</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Log in to order, earn coins, and track your orders</p>
        </div>
        <div class="login-card">
            <div class="card-icon"><iconify-icon icon="lucide:user" width="32"></iconify-icon></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn" id="submitBtn">Log In <iconify-icon icon="lucide:arrow-right" width="16"></iconify-icon></button>
            </form>
        </div>
        <div class="login-footer">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Only skip the form if the saved token is actually still valid.
        (async function () {
            if (!(window.API && API.isLoggedIn())) return;
            try {
                const r = await fetch(API.url('/api/user/profile'), { headers: { 'Authorization': 'Bearer ' + API.getAccess() } });
                if (r.ok) { window.location.href = API.isAdmin() ? 'admin-dashboard.html' : 'index.html'; return; }
                if (r.status === 401) API.clearSession(); // stale/expired token — drop it and show the form
            } catch (e) { /* backend asleep/unreachable — just show the login form */ }
        })();

        function showToast(msg, icon) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<iconify-icon icon="${icon || 'lucide:info'}" width="16"></iconify-icon> ${msg}`;
            document.getElementById('toastContainer').appendChild(t);
            requestAnimationFrame(() => t.classList.add('toast--visible'));
            setTimeout(() => { t.classList.remove('toast--visible'); setTimeout(() => t.remove(), 350); }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showToast('Please enter username and password', 'lucide:alert-circle'); return; }
            btn.disabled = true;
            try {
                const res = await API.apiFetch('/api/auth/login', { method: 'POST', json: { username, password } });
                const data = await res.json();
                if (!res.ok) { showToast(data.message || 'Invalid credentials', 'lucide:alert-circle'); btn.disabled = false; return; }
                API.setSession(data);
                showToast('Welcome back!', 'lucide:check-circle');
                setTimeout(() => {
                    window.location.href = (data.user && data.user.role === 'Admin') ? 'admin-dashboard.html' : 'index.html';
                }, 500);
            } catch (err) {
                showToast('Could not reach the server. Try again.', 'lucide:x-circle');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
