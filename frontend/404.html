<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--espresso:#1C1410;--cream:#FAF7F2;--terracotta:#C4704B;--border:#E8E0D6;--text-muted:#8B7D72}
        body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--espresso);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
        .code{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(5rem,18vw,10rem);color:var(--terracotta);line-height:1}
        h1{font-family:'Syne',sans-serif;font-weight:700;font-size:1.75rem;margin:8px 0 12px}
        p{color:var(--text-muted);max-width:420px;margin:0 auto 28px;font-weight:300}
        .btn{display:inline-block;background:var(--terracotta);color:#fff;padding:14px 32px;border-radius:9999px;font-weight:600;text-decoration:none;transition:.3s}
        .btn:hover{background:#A85D3C;transform:scale(1.03)}
        .logo{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.08em;margin-bottom:24px}
    </style>
</head>
<body>
    <div>
        <div class="logo">STUDIO 01</div>
        <div class="code">404</div>
        <h1>This page wandered off</h1>
        <p>The page you're looking for doesn't exist or was moved. Let's get you back to the good stuff.</p>
        <a class="btn" href="/">Back to Home</a>
    </div>
</body>
</html>
