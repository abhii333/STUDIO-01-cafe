<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--espresso:#1C1410;--cream:#FAF7F2;--terracotta:#C4704B;--terracotta-hover:#A85D3C;--border:#E8E0D6;--text-dark:#2C2420;--text-muted:#8B7D72;--text-light:#B5A99A;--card:#FFFFFF;--font-heading:'Syne',sans-serif;--font-body:'Inter',sans-serif;--radius-lg:20px;--radius-sm:8px;--radius-full:9999px;--shadow-md:0 4px 20px rgba(28,20,16,.08);--transition:.3s ease}
        body{font-family:var(--font-body);background:var(--cream);color:var(--text-dark);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .container{width:100%;max-width:440px}
        .header{text-align:center;margin-bottom:32px}
        .logo{font-family:var(--font-heading);font-size:1.5rem;font-weight:800;color:var(--espresso);margin-bottom:8px;letter-spacing:.08em}
        .title{font-family:var(--font-heading);font-size:1.75rem;font-weight:700;color:var(--espresso);margin-bottom:8px}
        .subtitle{font-size:.9375rem;color:var(--text-muted);font-weight:300}
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;box-shadow:var(--shadow-md)}
        .group{margin-bottom:20px}
        .label{display:block;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
        .input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.9375rem;color:var(--text-dark);background:var(--cream);outline:none;transition:border-color .3s}
        .input:focus{border-color:var(--terracotta)}
        .input::placeholder{color:var(--text-light)}
        .btn{width:100%;padding:14px;border-radius:var(--radius-full);font-size:.875rem;font-weight:600;border:none;background:var(--terracotta);color:#fff;cursor:pointer;font-family:inherit;transition:all .3s;margin-top:8px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
        .btn:hover{background:var(--terracotta-hover);transform:scale(1.02)}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .footer{text-align:center;margin-top:24px;font-size:.875rem;color:var(--text-muted)}
        .footer a{color:var(--terracotta);font-weight:600;text-decoration:none}
        .back{display:inline-flex;align-items:center;gap:6px;font-size:.875rem;color:var(--text-muted);text-decoration:none;margin-bottom:24px}
        .back:hover{color:var(--espresso)}
        .toast-container{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:4000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
        .toast{background:var(--espresso);color:#fff;padding:12px 24px;border-radius:var(--radius-full);font-size:.8125rem;font-weight:500;box-shadow:0 12px 40px rgba(28,20,16,.12);opacity:0;transform:translateY(20px);transition:all .35s ease;display:flex;align-items:center;gap:8px}
        .toast--visible{opacity:1;transform:translateY(0)}
        .toast iconify-icon{color:var(--terracotta)}
    </style>
</head>
<body>
    <div class="container">
        <a href="login.html" class="back"><iconify-icon icon="lucide:arrow-left" width="16"></iconify-icon> Back to Login</a>
        <div class="header">
            <div class="logo">STUDIO 01</div>
            <h1 class="title">Create Account</h1>
            <p class="subtitle">Join our loyalty program and start earning coins</p>
        </div>
        <div class="card">
            <form id="registerForm">
                <div class="group">
                    <label class="label" for="username">Username</label>
                    <input type="text" id="username" class="input" placeholder="Choose a username" required>
                </div>
                <div class="group">
                    <label class="label" for="email">Email</label>
                    <input type="email" id="email" class="input" placeholder="Enter your email" required>
                </div>
                <div class="group">
                    <label class="label" for="password">Password</label>
                    <input type="password" id="password" class="input" placeholder="Create a password" required>
                </div>
                <div class="group">
                    <label class="label" for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" class="input" placeholder="Confirm your password" required>
                </div>
                <div class="group">
                    <label class="label" for="referral_code">Referral Code (Optional)</label>
                    <input type="text" id="referral_code" class="input" placeholder="Enter friend's code for 50 coins">
                </div>
                <button type="submit" class="btn" id="submitBtn">Create Account</button>
            </form>
        </div>
        <div class="footer"><p>Already have an account? <a href="login.html">Log in here</a></p></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        (async function () {
            if (!(window.API && API.isLoggedIn())) return;
            try {
                const r = await fetch(API.url('/api/user/profile'), { headers: { 'Authorization': 'Bearer ' + API.getAccess() } });
                if (r.ok) { window.location.href = API.isAdmin() ? 'admin-dashboard.html' : 'index.html'; return; }
                if (r.status === 401) API.clearSession();
            } catch (e) {}
        })();
        function showToast(msg, icon) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<iconify-icon icon="${icon || 'lucide:info'}" width="16"></iconify-icon> ${msg}`;
            document.getElementById('toastContainer').appendChild(t);
            requestAnimationFrame(() => t.classList.add('toast--visible'));
            setTimeout(() => { t.classList.remove('toast--visible'); setTimeout(() => t.remove(), 350); }, 3000);
        }
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const referral_code = document.getElementById('referral_code').value.trim();
            if (!username || !email || !password) { showToast('Please fill all required fields', 'lucide:alert-circle'); return; }
            if (password !== confirm) { showToast('Passwords do not match', 'lucide:alert-circle'); return; }
            btn.disabled = true;
            try {
                const res = await API.apiFetch('/api/auth/register', { method: 'POST', json: { username, email, password, referral_code } });
                const data = await res.json();
                if (!res.ok) { showToast(data.message || 'Registration failed', 'lucide:alert-circle'); btn.disabled = false; return; }
                API.setSession(data);
                showToast('Account created! Welcome.', 'lucide:check-circle');
                setTimeout(() => { window.location.href = 'index.html'; }, 600);
            } catch (err) {
                showToast('Could not reach the server. Try again.', 'lucide:x-circle');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
