<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#FAF7F2;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#2C2420;padding:24px}
        .card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.05);max-width:400px;width:100%;text-align:center}
        h1{font-family:'Syne',sans-serif;margin-bottom:20px}
        p{color:#8B7D72;margin-bottom:24px;font-size:.9rem}
        input{width:100%;padding:12px;margin-bottom:16px;border:1px solid #E8E0D6;border-radius:8px;box-sizing:border-box;font-family:inherit}
        button{width:100%;padding:14px;background:#C4704B;color:#fff;border:none;border-radius:999px;font-weight:600;cursor:pointer;font-family:inherit}
        a{color:#C4704B;text-decoration:none;font-size:.9rem;display:block;margin-top:16px}
        .msg{margin:8px 0;font-size:.9rem;min-height:1.2em}
        .msg.error{color:#D32F2F}.msg.success{color:#388E3C}
    </style>
</head>
<body>
    <div class="card">
        <h1>Set New Password</h1>
        <p>Enter the reset token you received and your new password.</p>
        <div class="msg" id="msg"></div>
        <form id="rpForm">
            <input type="text" id="token" placeholder="Reset Token" required>
            <input type="password" id="password" placeholder="New Password" required>
            <button type="submit">Reset Password</button>
        </form>
        <a href="login.html">Back to Login</a>
    </div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        const msg = document.getElementById('msg');
        // Pre-fill token from ?token= in the URL if present.
        const params = new URLSearchParams(window.location.search);
        if (params.get('token')) document.getElementById('token').value = params.get('token');
        document.getElementById('rpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.textContent = ''; msg.className = 'msg';
            const token = document.getElementById('token').value.trim();
            const password = document.getElementById('password').value;
            try {
                const res = await API.apiFetch('/api/auth/reset-password', { method: 'POST', json: { token, password } });
                const data = await res.json();
                if (res.ok) { msg.textContent = 'Password reset! Redirecting to login...'; msg.className = 'msg success'; setTimeout(() => window.location.href = 'login.html', 1200); }
                else { msg.textContent = data.message || 'Invalid or expired token.'; msg.className = 'msg error'; }
            } catch (err) { msg.textContent = 'Network error.'; msg.className = 'msg error'; }
        });
    </script>
</body>
</html>
