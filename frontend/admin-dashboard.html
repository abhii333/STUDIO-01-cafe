<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--espresso:#1C1410;--cream:#FAF7F2;--terracotta:#C4704B;--border:#E8E0D6;--text-dark:#2C2420;--text-muted:#8B7D72;--card:#FFF;--font-h:'Syne',sans-serif;--font-b:'Inter',sans-serif}
        body{font-family:var(--font-b);background:var(--cream);color:var(--text-dark);padding:80px 24px}
        .container{max-width:1200px;margin:0 auto}
        nav{position:fixed;top:0;left:0;right:0;height:72px;background:rgba(250,247,242,.95);backdrop-filter:blur(16px);box-shadow:0 1px 0 var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
        nav a,nav button{font-size:.875rem;color:var(--text-muted);text-decoration:none;font-weight:500;background:none;border:none;cursor:pointer;font-family:inherit}
        nav a:hover,nav button:hover{color:var(--espresso)}
        h1{font-family:var(--font-h);font-size:2rem;margin-bottom:30px}
        .grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;margin-bottom:40px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.03)}
        .card h3{font-family:var(--font-h);margin-bottom:20px;font-size:1.1rem}
        .tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:12px;flex-wrap:wrap}
        .tab{padding:8px 16px;border-radius:8px;font-size:.875rem;font-weight:500;border:none;background:transparent;color:var(--text-muted);cursor:pointer}
        .tab.active{background:rgba(196,112,75,.1);color:var(--terracotta)}
        .section{display:none}.section.active{display:block}
        .order{border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden}
        .order-head{padding:16px;background:var(--cream);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
        .order-body{padding:16px;font-size:.875rem}
        .badge{padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:700;text-transform:uppercase}
        .badge-pending{background:rgba(255,193,7,.1);color:#ffc107}
        .badge-preparing{background:rgba(0,123,255,.1);color:#007bff}
        .badge-ready{background:rgba(40,167,69,.1);color:#28a745}
        .badge-completed{background:rgba(108,117,125,.1);color:#6c757d}
        .badge-paid{background:rgba(40,167,69,.1);color:#28a745}
        .btn{background:var(--espresso);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;margin-top:12px;font-family:inherit}
        select,input{padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;width:100%;margin-bottom:12px;box-sizing:border-box}
        .toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:280px;overflow:auto}
        .toggle-item{padding:10px;background:var(--cream);border-radius:8px;font-size:.8rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:1px solid var(--border);gap:8px}
        .toggle-item.sold{background:rgba(220,53,69,.05);border-color:rgba(220,53,69,.2);color:#dc3545}
        @media(max-width:900px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="font-family:var(--font-h);font-weight:800;color:var(--espresso);font-size:1.1rem">STUDIO 01 ADMIN</a>
        <div style="display:flex;gap:20px;align-items:center">
            <a href="index.html">View Site</a>
            <a href="change-password.html">Change Password</a>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>
    <div class="container">
        <h1>Dashboard</h1>
        <div class="grid">
            <div class="card"><h3>Revenue (Completed Orders)</h3><canvas id="revenueChart" height="120"></canvas></div>
            <div style="display:flex;flex-direction:column;gap:24px">
                <div class="card">
                    <h3>Set Special of the Day</h3>
                    <select id="specItem"></select>
                    <input type="number" id="specDisc" placeholder="Discount %" value="20" min="5" max="50">
                    <button class="btn" onclick="setSpecial()">Activate Special</button>
                </div>
                <div class="card">
                    <h3>Toggle Sold Out</h3>
                    <div class="toggle-grid" id="soldOutGrid"></div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('orders', this)">Orders</button>
            <button class="tab" onclick="switchTab('menu', this)">Menu</button>
            <button class="tab" onclick="switchTab('offers', this)">Offers</button>
            <button class="tab" onclick="switchTab('tables', this)">Tables</button>
            <button class="tab" onclick="switchTab('events', this)">Events</button>
            <button class="tab" onclick="switchTab('photos', this)">Gallery</button>
            <button class="tab" onclick="switchTab('res', this)">Reservations</button>
            <button class="tab" onclick="switchTab('audits', this)">Audits</button>
        </div>

        <div id="orders-sec" class="section active"></div>
        <div id="menu-sec" class="section">
            <div class="card" style="margin-bottom:20px">
                <h3 id="menuFormTitle">Add a Dish</h3>
                <input type="hidden" id="miId">
                <input id="miName" placeholder="Dish name">
                <input id="miPrice" type="number" placeholder="Price (₹)">
                <input id="miDesc" placeholder="Short description">
                <select id="miCategory"><option value="">Select category…</option></select>
                <input id="miNewCategory" placeholder="…or type a new category name">
                <input id="miImageUrl" placeholder="Image URL (paste, or upload below)">
                <input type="file" id="miImageFile" accept="image/*">
                <div id="miMsg" style="font-size:.8rem;color:var(--text-muted);margin-bottom:8px"></div>
                <img id="miPreview" style="display:none;width:90px;height:90px;object-fit:cover;border-radius:8px;margin-bottom:12px" alt="preview">
                <div style="display:flex;gap:8px">
                    <button class="btn" onclick="saveMenuItem()">Save Dish</button>
                    <button class="btn" style="background:#999" onclick="resetMenuForm()">Clear</button>
                </div>
            </div>
            <div id="menuItemsList"></div>
        </div>
        <div id="res-sec" class="section"></div>
        <div id="audits-sec" class="section"></div>

        <div id="offers-sec" class="section">
            <div class="card" style="margin-bottom:20px">
                <h3 id="offerFormTitle">Create Offer / Meal Deal</h3>
                <input type="hidden" id="ofId">
                <input id="ofTitle" placeholder="Offer title (e.g. Breakfast Combo)">
                <input id="ofDesc" placeholder="Short description">
                <select id="ofType" onchange="onOfferTypeChange()">
                    <option value="percent">Percent discount (%)</option>
                    <option value="flat">Flat discount (₹)</option>
                    <option value="combo">Combo (fixed price for selected items)</option>
                </select>
                <input id="ofDiscount" type="number" placeholder="Discount value (% or ₹)">
                <input id="ofCombo" type="number" placeholder="Combo price (₹)" style="display:none">
                <label style="font-size:.8rem;color:var(--text-muted)">Items in this offer (Ctrl/Cmd-click to select multiple)</label>
                <select id="ofItems" multiple size="5"></select>
                <input id="ofImage" placeholder="Image URL (optional)">
                <div style="display:flex;gap:12px;margin:8px 0">
                    <label style="font-size:.85rem"><input type="checkbox" id="ofActive" checked style="width:auto;margin:0 6px 0 0"> Active</label>
                </div>
                <div style="display:flex;gap:8px">
                    <input id="ofFrom" type="date" title="Valid from"><input id="ofUntil" type="date" title="Valid until">
                </div>
                <div id="ofMsg" style="font-size:.8rem;color:var(--text-muted);margin:8px 0"></div>
                <div style="display:flex;gap:8px">
                    <button class="btn" onclick="saveOffer()">Save Offer</button>
                    <button class="btn" style="background:#999" onclick="resetOfferForm()">Clear</button>
                </div>
            </div>
            <div id="offersList"></div>
        </div>

        <div id="tables-sec" class="section">
            <div class="card" style="margin-bottom:20px">
                <h3>Add Table</h3>
                <input id="tbNumber" placeholder="Table number (e.g. T7)">
                <input id="tbCapacity" type="number" placeholder="Capacity">
                <select id="tbLocation"><option value="indoor">Indoor</option><option value="outdoor">Outdoor</option><option value="terrace">Terrace</option></select>
                <div id="tbMsg" style="font-size:.8rem;color:var(--text-muted);margin-bottom:8px"></div>
                <button class="btn" onclick="addTable()">Add Table</button>
            </div>
            <div id="tablesList"></div>
        </div>

        <div id="events-sec" class="section">
            <div class="card" style="margin-bottom:20px">
                <h3 id="eventFormTitle">Create Event / Workshop</h3>
                <input type="hidden" id="evId">
                <input id="evTitle" placeholder="Event title">
                <input id="evDesc" placeholder="Description">
                <div style="display:flex;gap:8px"><input id="evDate" type="date"><input id="evTime" type="time"></div>
                <div style="display:flex;gap:8px">
                    <input id="evCapacity" type="number" placeholder="Capacity"><input id="evPrice" type="number" placeholder="Price (₹)"><input id="evDuration" type="number" placeholder="Minutes">
                </div>
                <input id="evImage" placeholder="Image URL (optional)">
                <div id="evMsg" style="font-size:.8rem;color:var(--text-muted);margin:8px 0"></div>
                <div style="display:flex;gap:8px">
                    <button class="btn" onclick="saveEvent()">Save Event</button>
                    <button class="btn" style="background:#999" onclick="resetEventForm()">Clear</button>
                </div>
            </div>
            <div id="eventsList"></div>
        </div>

        <div id="photos-sec" class="section">
            <div class="card" style="margin-bottom:20px">
                <h3>Add Gallery Photo</h3>
                <input id="phUrl" placeholder="Image URL">
                <input id="phCaption" placeholder="Caption (optional)">
                <div id="phMsg" style="font-size:.8rem;color:var(--text-muted);margin-bottom:8px"></div>
                <button class="btn" onclick="addPhoto()">Add Photo</button>
            </div>
            <div id="photosList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px"></div>
        </div>
    </div>

    <!-- Mark Paid Modal -->
    <div id="markPaidModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:200">
        <div style="background:#fff;padding:20px;border-radius:12px;max-width:420px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.2)">
            <h3 style="margin-bottom:8px">Confirm Payment</h3>
            <p style="color:#8B7D72;margin-bottom:12px">Enter a payment id to associate with this order (optional).</p>
            <input id="markPaidInput" placeholder="Payment ID (optional)" style="width:100%;padding:10px;border:1px solid #E8E0D6;border-radius:8px;margin-bottom:12px">
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button class="btn" style="background:#ccc;color:#222" onclick="closeMarkModal()">Cancel</button>
                <button class="btn" onclick="confirmMarkPaid()">Confirm</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!API.requireAdmin()) { /* redirected */ }
        function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        let menuItemNames = [];
        let revenueChart = null;

        async function loadData() {
            let stats, orders, res, so, auditsResp, menu;
            try {
                [stats, orders, res, so, auditsResp, menu] = await Promise.all([
                    API.authFetch('/api/admin/stats').then(r => r.json()),
                    API.authFetch('/api/admin/orders').then(r => r.json()),
                    API.authFetch('/api/admin/reservations').then(r => r.json()),
                    API.apiFetch('/api/soldout').then(r => r.json()),
                    API.authFetch('/api/admin/audits').then(r => r.json()),
                    API.apiFetch('/api/menu').then(r => r.json())
                ]);
            } catch (e) { return; } // authFetch redirects on 401

            // Dynamic menu names (replaces the old hardcoded array)
            menuItemNames = [];
            const menuObj = menu.menu || {};
            Object.keys(menuObj).forEach(cat => Object.keys(menuObj[cat]).forEach(n => menuItemNames.push(n)));

            document.getElementById('specItem').innerHTML = menuItemNames.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');

            // Revenue chart
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if (revenueChart) revenueChart.destroy();
            revenueChart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(stats), datasets: [{ label: 'Revenue (₹)', data: Object.values(stats), backgroundColor: 'rgba(196,112,75,.5)', borderColor: '#C4704B', borderWidth: 2 }] }, options: { scales: { y: { beginAtZero: true } } } });

            // Sold-out grid
            document.getElementById('soldOutGrid').innerHTML = menuItemNames.map(m =>
                `<div class="toggle-item ${so.includes(m) ? 'sold' : ''}" onclick="toggleSold('${esc(m).replace(/'/g, "\\'")}', this)">${esc(m)}<span>${so.includes(m) ? 'SOLD OUT' : 'AVAILABLE'}</span></div>`
            ).join('');

            // Orders
            const oSec = document.getElementById('orders-sec');
            oSec.innerHTML = orders.length ? orders.map(o => {
                const items = o.items.map(i => esc(i.name)).join(', ');
                let btn = '';
                if (o.status === 'Pending') btn = `<button class="btn" onclick="updStatus(${o.order_id}, 'Preparing')">Start Preparing</button> <button class="btn" style="background:#2c9f4a;margin-left:8px" onclick="markPaid(${o.order_id})">Mark Paid</button>`;
                if (o.status === 'Preparing') btn = `<button class="btn" onclick="updStatus(${o.order_id}, 'Ready')">Mark Ready</button>`;
                if (o.status === 'Ready') btn = `<button class="btn" onclick="updStatus(${o.order_id}, 'Completed')">Complete</button>`;
                const statuses = ['Pending', 'Preparing', 'Ready', 'Completed'];
                const currIdx = statuses.indexOf(o.status);
                const trackerHtml = statuses.map((s, i) => `
                    <div style="display:flex;flex-direction:column;align-items:center;flex:1;position:relative;z-index:1">
                        <div style="width:28px;height:28px;border-radius:50%;background:${i < currIdx ? '#28a745' : i === currIdx ? 'var(--terracotta)' : 'var(--border)'};color:${i <= currIdx ? '#fff' : 'var(--text-muted)'};display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;margin-bottom:6px">${i < currIdx ? '&#10003;' : i + 1}</div>
                        <span style="font-size:.65rem;color:${i <= currIdx ? 'var(--espresso)' : 'var(--text-muted)'};text-transform:uppercase;font-weight:600">${s}</span>
                    </div>`).join('');
                const paymentLabel = o.payment_method ? `<p style="margin-top:8px"><strong>Payment:</strong> ${esc(o.payment_method)}</p>` : '';
                return `<div class="order">
                    <div class="order-head"><strong>#${o.order_id} by ${esc(o.customer_name)}</strong><span class="badge badge-${(o.status || '').toLowerCase()}">${esc(o.status)}</span></div>
                    <div class="order-body">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 24px;position:relative">
                            <div style="position:absolute;top:14px;left:30px;right:30px;height:2px;background:var(--border);z-index:0"></div>${trackerHtml}
                        </div>
                        <p><strong>Items:</strong> ${items}</p>
                        <p style="margin-top:8px"><strong>Total:</strong> ₹${o.currency_paid}</p>
                        ${paymentLabel}${btn}
                    </div>
                </div>`;
            }).join('') : '<p style="text-align:center;color:var(--text-muted)">No orders.</p>';

            // Reservations (now includes assigned table + status)
            document.getElementById('res-sec').innerHTML = res.length ? res.map(r =>
                `<div class="order"><div class="order-head"><strong>${esc(r.name)}</strong><span>${esc(r.email)}</span></div><div class="order-body">
                    <p><strong>Date:</strong> ${esc(r.date)} | <strong>Time:</strong> ${esc(r.time)} | <strong>Guests:</strong> ${esc(r.guests)}</p>
                    <p style="margin-top:8px"><span class="badge badge-ready">Table: ${r.table ? esc(r.table) + (r.table_location ? ' · ' + esc(r.table_location) : '') : 'No specific table'}</span> <span class="badge badge-completed">${esc(r.status || 'Confirmed')}</span></p>
                    ${r.notes && r.notes !== 'None' ? `<p style="margin-top:8px;color:var(--text-muted)">"${esc(r.notes)}"</p>` : ''}
                </div></div>`
            ).join('') : '<p style="text-align:center;color:var(--text-muted)">No reservations.</p>';

            // Audits (endpoint returns {audits:[...]})
            const audits = (auditsResp && auditsResp.audits) || [];
            document.getElementById('audits-sec').innerHTML = audits.length ? audits.map(a =>
                `<div class="order"><div class="order-head"><strong>Order #${a.order_id}</strong><span>${esc(a.action)}</span></div><div class="order-body"><p><strong>By:</strong> ${esc(a.admin)} | <strong>At:</strong> ${new Date(a.timestamp).toLocaleString()}</p><p style="margin-top:8px;color:var(--text-muted)">${esc(JSON.stringify(a.meta))}</p></div></div>`
            ).join('') : '<p style="text-align:center;color:var(--text-muted)">No audit entries.</p>';
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id + '-sec').classList.add('active');
            if (id === 'menu') loadMenu();
            if (id === 'offers') loadOffers();
            if (id === 'tables') loadTables();
            if (id === 'events') loadEvents();
            if (id === 'photos') loadPhotos();
        }

        // ---- Menu management (Task 8) ----
        let _menuItems = {};
        async function loadMenu() {
            const [cats, items] = await Promise.all([
                API.authFetch('/api/admin/categories').then(r => r.json()),
                API.authFetch('/api/admin/menu-items').then(r => r.json())
            ]);
            const sel = document.getElementById('miCategory');
            const cur = sel.value;
            sel.innerHTML = '<option value="">Select category…</option>' + cats.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
            if (cur) sel.value = cur;
            _menuItems = {};
            items.forEach(i => _menuItems[i.id] = i);
            const list = document.getElementById('menuItemsList');
            list.innerHTML = items.length ? items.map(i => `
                <div class="order"><div class="order-head">
                    <strong>${esc(i.name)} — ₹${i.price}</strong>
                    <span>${esc(i.category || '')}${i.is_sold_out ? ' · SOLD OUT' : ''}</span>
                </div><div class="order-body">
                    <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
                        ${i.image_url ? `<img src="${esc(i.image_url)}" style="width:56px;height:56px;object-fit:cover;border-radius:8px">` : ''}
                        <p style="flex:1;color:var(--text-muted);font-size:.85rem">${esc(i.description || '')}</p>
                    </div>
                    <button class="btn" onclick="editMenuItem(${i.id})">Edit</button>
                    <button class="btn" style="background:#dc3545;margin-left:8px" onclick="deleteMenuItem(${i.id})">Delete</button>
                </div></div>`).join('') : '<p style="text-align:center;color:var(--text-muted)">No items yet.</p>';
        }
        function showPreview(url) { const p = document.getElementById('miPreview'); if (url) { p.src = url; p.style.display = 'block'; } else { p.style.display = 'none'; } }
        function editMenuItem(id) {
            const i = _menuItems[id]; if (!i) return;
            document.getElementById('miId').value = i.id;
            document.getElementById('miName').value = i.name;
            document.getElementById('miPrice').value = i.price;
            document.getElementById('miDesc').value = i.description || '';
            document.getElementById('miImageUrl').value = i.image_url || '';
            document.getElementById('miCategory').value = i.category_id || '';
            document.getElementById('miNewCategory').value = '';
            document.getElementById('menuFormTitle').textContent = 'Edit Dish';
            showPreview(i.image_url);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function resetMenuForm() {
            ['miId', 'miName', 'miPrice', 'miDesc', 'miImageUrl', 'miNewCategory'].forEach(x => document.getElementById(x).value = '');
            document.getElementById('miCategory').value = '';
            document.getElementById('menuFormTitle').textContent = 'Add a Dish';
            document.getElementById('miMsg').textContent = '';
            showPreview('');
        }
        async function saveMenuItem() {
            const msg = document.getElementById('miMsg');
            const id = document.getElementById('miId').value;
            const name = document.getElementById('miName').value.trim();
            const price = document.getElementById('miPrice').value;
            const description = document.getElementById('miDesc').value.trim();
            const image_url = document.getElementById('miImageUrl').value.trim();
            const newCat = document.getElementById('miNewCategory').value.trim();
            const category_id = document.getElementById('miCategory').value;
            if (!name || !price) { msg.textContent = 'Name and price are required.'; return; }
            if (!newCat && !category_id) { msg.textContent = 'Pick or type a category.'; return; }
            const body = { name, price, description, image_url };
            if (newCat) body.category = newCat; else body.category_id = parseInt(category_id);
            const res = id
                ? await API.authFetch('/api/admin/menu-items/' + id, { method: 'PUT', json: body })
                : await API.authFetch('/api/admin/menu-items', { method: 'POST', json: body });
            const d = await res.json();
            if (res.ok) { resetMenuForm(); loadMenu(); msg.textContent = 'Saved!'; }
            else { msg.textContent = d.message || 'Save failed.'; }
        }
        async function deleteMenuItem(id) {
            if (!confirm('Delete this dish? Past orders keep their records.')) return;
            await API.authFetch('/api/admin/menu-items/' + id, { method: 'DELETE' });
            loadMenu();
        }
        document.getElementById('miImageFile').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const msg = document.getElementById('miMsg');
            msg.textContent = 'Uploading…';
            const fd = new FormData(); fd.append('file', file);
            try {
                const res = await API.authFetch('/api/admin/upload-image', { method: 'POST', body: fd });
                const d = await res.json();
                if (res.ok && d.url) { document.getElementById('miImageUrl').value = d.url; showPreview(d.url); msg.textContent = 'Image uploaded.'; }
                else { msg.textContent = (d.error || 'Upload failed') + ' — paste an image URL instead.'; }
            } catch (err) { msg.textContent = 'Upload error — paste an image URL instead.'; }
        });
        async function updStatus(id, status) {
            await API.authFetch('/api/admin/update-order-status', { method: 'POST', json: { order_id: id, status } });
            loadData();
        }
        async function setSpecial() {
            const item = document.getElementById('specItem').value;
            const disc = document.getElementById('specDisc').value;
            await API.authFetch('/api/admin/special', { method: 'POST', json: { item, discount: disc } });
            alert('Special activated!');
        }
        async function toggleSold(item, el) {
            await API.authFetch('/api/admin/toggle-soldout', { method: 'POST', json: { item } });
            el.classList.toggle('sold');
            el.querySelector('span').textContent = el.classList.contains('sold') ? 'SOLD OUT' : 'AVAILABLE';
        }

        let _pendingMarkOrder = null;
        function markPaid(orderId) { _pendingMarkOrder = orderId; document.getElementById('markPaidInput').value = ''; document.getElementById('markPaidModal').style.display = 'flex'; }
        function closeMarkModal() { document.getElementById('markPaidModal').style.display = 'none'; _pendingMarkOrder = null; }
        async function confirmMarkPaid() {
            const pid = document.getElementById('markPaidInput').value || null;
            try {
                const res = await API.authFetch('/api/admin/mark-paid', { method: 'POST', json: { order_id: _pendingMarkOrder, payment_id: pid } });
                if (res.ok) alert('Order marked Paid'); else alert('Failed to mark Paid');
            } catch (e) { alert('Network error'); }
            closeMarkModal();
            loadData();
        }

        // ---- Offers (Task 9) ----
        let _offers = {};
        async function loadOffers() {
            const [offers, items] = await Promise.all([
                API.authFetch('/api/admin/offers').then(r => r.json()),
                API.authFetch('/api/admin/menu-items').then(r => r.json())
            ]);
            document.getElementById('ofItems').innerHTML = items.map(i => `<option value="${i.id}">${esc(i.name)} (₹${i.price})</option>`).join('');
            _offers = {}; offers.forEach(o => _offers[o.id] = o);
            document.getElementById('offersList').innerHTML = offers.length ? offers.map(o => `
                <div class="order"><div class="order-head"><strong>${esc(o.title)}</strong><span class="badge ${o.is_active ? 'badge-ready' : 'badge-completed'}">${o.is_active ? 'Active' : 'Inactive'}</span></div>
                <div class="order-body"><p style="color:var(--text-muted);font-size:.85rem">${esc(o.description || '')}</p>
                <p style="margin-top:6px"><strong>${esc(o.offer_type)}</strong> ${o.offer_type === 'combo' ? ('· ₹' + o.combo_price) : ('· ' + o.discount_value + (o.offer_type === 'percent' ? '%' : '₹'))}</p>
                ${o.items && o.items.length ? `<p style="font-size:.8rem;color:var(--text-muted)">Items: ${o.items.map(esc).join(', ')}</p>` : ''}
                <button class="btn" onclick="editOffer(${o.id})">Edit</button>
                <button class="btn" style="background:#dc3545;margin-left:8px" onclick="deleteOffer(${o.id})">Delete</button>
                </div></div>`).join('') : '<p style="text-align:center;color:var(--text-muted)">No offers yet.</p>';
        }
        function onOfferTypeChange() {
            const t = document.getElementById('ofType').value;
            document.getElementById('ofCombo').style.display = t === 'combo' ? 'block' : 'none';
            document.getElementById('ofDiscount').style.display = t === 'combo' ? 'none' : 'block';
        }
        function resetOfferForm() {
            ['ofId', 'ofTitle', 'ofDesc', 'ofDiscount', 'ofCombo', 'ofImage', 'ofFrom', 'ofUntil'].forEach(x => document.getElementById(x).value = '');
            document.getElementById('ofType').value = 'percent';
            document.getElementById('ofActive').checked = true;
            [...document.getElementById('ofItems').options].forEach(o => o.selected = false);
            document.getElementById('offerFormTitle').textContent = 'Create Offer / Meal Deal';
            document.getElementById('ofMsg').textContent = '';
            onOfferTypeChange();
        }
        function editOffer(id) {
            const o = _offers[id]; if (!o) return;
            document.getElementById('ofId').value = o.id;
            document.getElementById('ofTitle').value = o.title;
            document.getElementById('ofDesc').value = o.description || '';
            document.getElementById('ofType').value = o.offer_type;
            document.getElementById('ofDiscount').value = o.discount_value || '';
            document.getElementById('ofCombo').value = o.combo_price || '';
            document.getElementById('ofImage').value = o.image_url || '';
            document.getElementById('ofActive').checked = !!o.is_active;
            document.getElementById('ofFrom').value = o.valid_from || '';
            document.getElementById('ofUntil').value = o.valid_until || '';
            [...document.getElementById('ofItems').options].forEach(opt => opt.selected = (o.item_ids || []).includes(parseInt(opt.value)));
            document.getElementById('offerFormTitle').textContent = 'Edit Offer';
            onOfferTypeChange();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        async function saveOffer() {
            const msg = document.getElementById('ofMsg');
            const id = document.getElementById('ofId').value;
            const item_ids = [...document.getElementById('ofItems').selectedOptions].map(o => parseInt(o.value));
            const body = {
                title: document.getElementById('ofTitle').value.trim(), description: document.getElementById('ofDesc').value.trim(),
                offer_type: document.getElementById('ofType').value, discount_value: document.getElementById('ofDiscount').value || 0,
                combo_price: document.getElementById('ofCombo').value || 0, image_url: document.getElementById('ofImage').value.trim(),
                is_active: document.getElementById('ofActive').checked, valid_from: document.getElementById('ofFrom').value || null,
                valid_until: document.getElementById('ofUntil').value || null, item_ids
            };
            if (!body.title) { msg.textContent = 'Title required.'; return; }
            const res = id ? await API.authFetch('/api/admin/offers/' + id, { method: 'PUT', json: body }) : await API.authFetch('/api/admin/offers', { method: 'POST', json: body });
            if (res.ok) { resetOfferForm(); loadOffers(); msg.textContent = 'Saved!'; } else { msg.textContent = 'Save failed.'; }
        }
        async function deleteOffer(id) { if (!confirm('Delete this offer?')) return; await API.authFetch('/api/admin/offers/' + id, { method: 'DELETE' }); loadOffers(); }

        // ---- Tables (Task 10) ----
        async function loadTables() {
            const tables = await API.authFetch('/api/admin/tables').then(r => r.json());
            document.getElementById('tablesList').innerHTML = tables.length ? tables.map(t => `
                <div class="order"><div class="order-head"><strong>${esc(t.table_number)} · ${esc(t.location)}</strong><span class="badge ${t.is_available ? 'badge-ready' : 'badge-completed'}">${t.is_available ? 'Available' : 'Disabled'}</span></div>
                <div class="order-body"><p>Seats: ${t.capacity}</p>
                <button class="btn" onclick="toggleTable(${t.id}, ${!t.is_available})">${t.is_available ? 'Disable' : 'Enable'}</button>
                <button class="btn" style="background:#dc3545;margin-left:8px" onclick="deleteTable(${t.id})">Delete</button>
                </div></div>`).join('') : '<p style="text-align:center;color:var(--text-muted)">No tables.</p>';
        }
        async function addTable() {
            const msg = document.getElementById('tbMsg');
            const body = { table_number: document.getElementById('tbNumber').value.trim(), capacity: document.getElementById('tbCapacity').value || 2, location: document.getElementById('tbLocation').value };
            if (!body.table_number) { msg.textContent = 'Table number required.'; return; }
            const res = await API.authFetch('/api/admin/tables', { method: 'POST', json: body });
            const d = await res.json();
            if (res.ok) { document.getElementById('tbNumber').value = ''; document.getElementById('tbCapacity').value = ''; msg.textContent = 'Added!'; loadTables(); } else { msg.textContent = d.message || 'Failed.'; }
        }
        async function toggleTable(id, avail) { await API.authFetch('/api/admin/tables/' + id, { method: 'PATCH', json: { is_available: avail } }); loadTables(); }
        async function deleteTable(id) { if (!confirm('Delete this table?')) return; await API.authFetch('/api/admin/tables/' + id, { method: 'DELETE' }); loadTables(); }

        // ---- Events (Task 14) ----
        let _events = {};
        async function loadEvents() {
            const events = await API.authFetch('/api/admin/events').then(r => r.json());
            _events = {}; events.forEach(e => _events[e.id] = e);
            document.getElementById('eventsList').innerHTML = events.length ? events.map(e => `
                <div class="order"><div class="order-head"><strong>${esc(e.title)}</strong><span class="badge ${e.is_sold_out ? 'badge-completed' : 'badge-ready'}">${e.registered_count}/${e.capacity}${e.is_sold_out ? ' · SOLD OUT' : ''}</span></div>
                <div class="order-body"><p style="color:var(--text-muted);font-size:.85rem">${esc(e.description || '')}</p>
                <p style="margin-top:6px">${esc(e.date)} at ${esc(e.time)} · ₹${e.price} · ${e.is_active ? 'Active' : 'Cancelled'}</p>
                <button class="btn" onclick="editEvent(${e.id})">Edit</button>
                <button class="btn" style="background:#dc3545;margin-left:8px" onclick="deleteEvent(${e.id})">Delete</button>
                </div></div>`).join('') : '<p style="text-align:center;color:var(--text-muted)">No events.</p>';
        }
        function resetEventForm() { ['evId', 'evTitle', 'evDesc', 'evDate', 'evTime', 'evCapacity', 'evPrice', 'evDuration', 'evImage'].forEach(x => document.getElementById(x).value = ''); document.getElementById('eventFormTitle').textContent = 'Create Event / Workshop'; document.getElementById('evMsg').textContent = ''; }
        function editEvent(id) { const e = _events[id]; if (!e) return; document.getElementById('evId').value = e.id; document.getElementById('evTitle').value = e.title; document.getElementById('evDesc').value = e.description || ''; document.getElementById('evDate').value = e.date; document.getElementById('evTime').value = e.time; document.getElementById('evCapacity').value = e.capacity; document.getElementById('evPrice').value = e.price; document.getElementById('evDuration').value = e.duration_minutes; document.getElementById('evImage').value = e.image_url || ''; document.getElementById('eventFormTitle').textContent = 'Edit Event'; window.scrollTo({ top: 0, behavior: 'smooth' }); }
        async function saveEvent() {
            const msg = document.getElementById('evMsg');
            const id = document.getElementById('evId').value;
            const body = { title: document.getElementById('evTitle').value.trim(), description: document.getElementById('evDesc').value.trim(), date: document.getElementById('evDate').value, time: document.getElementById('evTime').value, capacity: document.getElementById('evCapacity').value || 10, price: document.getElementById('evPrice').value || 0, duration_minutes: document.getElementById('evDuration').value || 60, image_url: document.getElementById('evImage').value.trim() };
            if (!body.title || !body.date || !body.time) { msg.textContent = 'Title, date, and time required.'; return; }
            const res = id ? await API.authFetch('/api/admin/events/' + id, { method: 'PUT', json: body }) : await API.authFetch('/api/admin/events', { method: 'POST', json: body });
            if (res.ok) { resetEventForm(); loadEvents(); msg.textContent = 'Saved!'; } else { msg.textContent = 'Save failed.'; }
        }
        async function deleteEvent(id) { if (!confirm('Delete this event?')) return; await API.authFetch('/api/admin/events/' + id, { method: 'DELETE' }); loadEvents(); }

        // ---- Photos / Gallery (Task 13) ----
        async function loadPhotos() {
            const photos = await API.apiFetch('/api/photos').then(r => r.json());
            document.getElementById('photosList').innerHTML = photos.length ? photos.map(p => `
                <div style="position:relative"><img src="${esc(p.image_url)}" style="width:100%;height:120px;object-fit:cover;border-radius:8px">
                <button class="btn" style="background:#dc3545;position:absolute;top:6px;right:6px;padding:4px 9px;margin:0" onclick="deletePhoto(${p.id})">×</button>
                ${p.caption ? `<p style="font-size:.75rem;color:var(--text-muted);margin-top:4px">${esc(p.caption)}</p>` : ''}</div>`).join('') : '<p style="color:var(--text-muted)">No photos yet.</p>';
        }
        async function addPhoto() {
            const msg = document.getElementById('phMsg');
            const body = { image_url: document.getElementById('phUrl').value.trim(), caption: document.getElementById('phCaption').value.trim() };
            if (!body.image_url) { msg.textContent = 'Image URL required.'; return; }
            const res = await API.authFetch('/api/admin/photos', { method: 'POST', json: body });
            if (res.ok) { document.getElementById('phUrl').value = ''; document.getElementById('phCaption').value = ''; msg.textContent = 'Added!'; loadPhotos(); } else { msg.textContent = 'Failed.'; }
        }
        async function deletePhoto(id) { await API.authFetch('/api/admin/photos/' + id, { method: 'DELETE' }); loadPhotos(); }

        document.getElementById('logoutBtn').addEventListener('click', () => API.logout());
        loadData();
    </script>
</body>
</html>
