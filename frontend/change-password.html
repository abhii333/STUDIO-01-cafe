<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#FAF7F2;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#2C2420;padding:24px}
        .card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.05);max-width:420px;width:100%;text-align:center}
        h1{font-family:'Syne',sans-serif;margin-bottom:20px}
        input{width:100%;padding:12px;margin-bottom:12px;border:1px solid #E8E0D6;border-radius:8px;box-sizing:border-box;font-family:inherit}
        button{width:100%;padding:14px;background:#C4704B;color:#fff;border:none;border-radius:999px;font-weight:600;cursor:pointer;font-family:inherit}
        a{color:#C4704B;text-decoration:none;font-size:.9rem;display:block;margin-top:12px}
        .msg{margin:8px 0;font-size:.9rem;min-height:1.2em}
        .msg.error{color:#D32F2F}.msg.success{color:#388E3C}
    </style>
</head>
<body>
    <div class="card">
        <h1>Change Password</h1>
        <div class="msg" id="msg"></div>
        <form id="cpForm">
            <input type="password" id="current_password" placeholder="Current Password" required>
            <input type="password" id="new_password" placeholder="New Password" required>
            <button type="submit">Update Password</button>
        </form>
        <a href="index.html">Back to Home</a>
    </div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!API.requireAuth()) { /* redirected */ }
        const msg = document.getElementById('msg');
        document.getElementById('cpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.textContent = ''; msg.className = 'msg';
            const current_password = document.getElementById('current_password').value;
            const new_password = document.getElementById('new_password').value;
            try {
                const res = await API.authFetch('/api/auth/change-password', { method: 'POST', json: { current_password, new_password } });
                const data = await res.json();
                if (res.ok) { msg.textContent = 'Password changed successfully.'; msg.className = 'msg success'; document.getElementById('cpForm').reset(); }
                else { msg.textContent = data.message || 'Could not change password.'; msg.className = 'msg error'; }
            } catch (err) { msg.textContent = 'Network error.'; msg.className = 'msg error'; }
        });
    </script>
</body>
</html>
