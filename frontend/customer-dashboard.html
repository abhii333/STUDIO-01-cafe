<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--espresso:#1C1410;--cream:#FAF7F2;--terracotta:#C4704B;--border:#E8E0D6;--text-dark:#2C2420;--text-muted:#8B7D72;--card:#FFF;--font-h:'Syne',sans-serif;--font-b:'Inter',sans-serif}
        body{font-family:var(--font-b);background:var(--cream);color:var(--text-dark);padding:80px 24px}
        .container{max-width:900px;margin:0 auto}
        nav{position:fixed;top:0;left:0;right:0;height:72px;background:rgba(250,247,242,.95);backdrop-filter:blur(16px);box-shadow:0 1px 0 var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
        nav a,nav button{font-size:.875rem;color:var(--text-muted);text-decoration:none;font-weight:500;background:none;border:none;cursor:pointer;font-family:inherit}
        nav a:hover,nav button:hover{color:var(--espresso)}
        h1{font-family:var(--font-h);font-size:2rem;margin-bottom:8px}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:30px 0}
        .stat{background:var(--card);padding:20px;border-radius:14px;border:1px solid var(--border)}
        .stat h4{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px}
        .stat span{font-family:var(--font-h);font-size:2rem;font-weight:800}
        .stat.coins span{color:var(--terracotta)}
        .ref-box{background:var(--espresso);color:#fff;padding:20px;border-radius:14px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
        .ref-code{font-family:monospace;font-size:1.5rem;letter-spacing:4px;color:var(--terracotta);background:rgba(255,255,255,.1);padding:8px 16px;border-radius:8px}
        .order{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;overflow:hidden}
        .order-head{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .order-head h3{font-family:var(--font-h);font-size:1.1rem}
        .order-body{padding:20px}
        .tracker{display:flex;align-items:center;justify-content:space-between;margin:20px 0;position:relative}
        .tracker::before{content:'';position:absolute;top:15px;left:40px;right:40px;height:2px;background:var(--border);z-index:0}
        .step{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
        .circle{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-weight:700;font-size:.8rem;margin-bottom:8px;transition:all .3s}
        .step.active .circle{background:var(--terracotta);color:#fff;box-shadow:0 0 0 4px rgba(196,112,75,.2)}
        .step.done .circle{background:#28a745;color:#fff}
        .step span{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;font-weight:600}
        .step.active span,.step.done span{color:var(--espresso)}
        .review-form{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);display:none}
        .stars-input{font-size:2rem;cursor:pointer;display:inline-flex;gap:4px}
        .stars-input .star{color:var(--border);transition:color .15s}
        .stars-input .star.filled{color:#f4c430}
        textarea{width:100%;margin:10px 0;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;resize:none}
        .btn{background:var(--terracotta);color:#fff;border:none;padding:10px 20px;border-radius:999px;font-weight:600;cursor:pointer;font-family:inherit}
        .badge{padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
        .badge-pending{background:rgba(255,193,7,.15);color:#a67c00}
        .badge-preparing{background:rgba(0,123,255,.12);color:#007bff}
        .badge-ready{background:rgba(196,112,75,.15);color:var(--terracotta)}
        .badge-completed{background:rgba(40,167,69,.15);color:#28a745}
        .badge-cancelled{background:rgba(220,53,69,.15);color:#dc3545}
        .live-indicator{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text-muted);margin-left:10px}
        .live-dot{width:8px;height:8px;border-radius:50%;background:#28a745;animation:pulse 1.6s infinite}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(40,167,69,.5)}70%{box-shadow:0 0 0 7px rgba(40,167,69,0)}100%{box-shadow:0 0 0 0 rgba(40,167,69,0)}}
        @keyframes badgePop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
        /* Mobile improvements */
        @media(max-width:600px){
            body{padding:72px 12px 40px}
            .stats{grid-template-columns:1fr;gap:10px}
            .stat span{font-size:1.5rem}
            .ref-box{flex-direction:column;text-align:center;gap:10px}
            .ref-code{font-size:1.2rem;letter-spacing:3px}
            .tracker{gap:0}
            .circle{width:28px;height:28px;font-size:.7rem}
            .step span{font-size:.6rem}
            .order-head{flex-direction:column;align-items:flex-start;gap:6px}
            h1{font-size:1.5rem}
            nav{padding:0 12px}
            nav div{gap:12px}
            .btn{padding:10px 16px;font-size:.85rem;min-height:44px}
            #badgesGrid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="font-family:var(--font-h);font-weight:800;color:var(--espresso);font-size:1.1rem">STUDIO 01</a>
        <div style="display:flex;gap:20px;align-items:center">
            <a href="index.html">Menu</a>
            <a href="group-order.html">Group Order</a>
            <a href="change-password.html">Change Password</a>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>
    <div class="container">
        <h1>My Dashboard</h1>
        <p style="color:var(--text-muted)">Welcome back, <span id="uName"></span>!</p>

        <div class="ref-box">
            <div><h4 style="color:rgba(255,255,255,.5);margin-bottom:4px">YOUR REFERRAL CODE</h4><p style="font-size:.8rem;color:rgba(255,255,255,.7)">Share this to earn 50 free coins!</p></div>
            <div class="ref-code" id="refCode">------</div>
        </div>

        <div class="stats" id="statsGrid"></div>

        <h2 style="font-family:var(--font-h);margin:10px 0 20px">Your Badges <span id="streakLabel" style="font-size:.9rem;color:var(--terracotta);font-weight:600"></span></h2>
        <div id="badgesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:36px"></div>

        <h2 id="orderHistoryHeading" style="font-family:var(--font-h);margin-bottom:20px">Order History</h2>
        <div id="orders"></div>
    </div>

    <link rel="stylesheet" href="css/skeletons.css">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/skeleton-boot.js"></script>
    <script type="module" src="js/skeleton-runtime.mjs"></script>
    <script>
        // Staff accounts have their own dashboard — never the customer loyalty one.
        if (window.API && API.isLoggedIn() && API.isAdmin()) { location.replace('admin-dashboard.html'); }
        if (!API.requireAuth()) { /* redirected to login */ }

        function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        const STATUSES = ['Pending', 'Preparing', 'Ready', 'Completed'];
        function trackerHtml(status) {
            if (status === 'Cancelled') return '<p style="width:100%;text-align:center;color:#dc3545;font-weight:600">&#10007; This order was cancelled.</p>';
            const currIdx = STATUSES.indexOf(status);
            return STATUSES.map((s, i) => `
                    <div class="step ${i < currIdx ? 'done' : ''} ${i === currIdx ? 'active' : ''}">
                        <div class="circle">${i < currIdx ? '&#10003;' : i + 1}</div><span>${s}</span>
                    </div>`).join('');
        }
        function statusBadgeClass(status){ return 'ostatus badge badge-' + String(status || '').toLowerCase(); }

        async function init() {
            // Paint pixel-matched skeletons while profile + orders load.
            if (window.Skeletons) {
                Skeletons.fill('statsGrid', 'stat-card', 3);
                Skeletons.fill('badgesGrid', 'badge-card', 6);
                Skeletons.fill('orders', 'order-card', 3);
            }
            let profile;
            try {
                const pRes = await API.authFetch('/api/user/profile');
                profile = await pRes.json();
            } catch (e) { return; } // authFetch already redirected on 401
            document.getElementById('uName').textContent = profile.username;
            document.getElementById('refCode').textContent = profile.ref_code || '------';

            // Streak + badges (Task 11)
            document.getElementById('streakLabel').textContent = profile.current_streak ? ('🔥 ' + profile.current_streak + '-day streak') : '';
            document.getElementById('badgesGrid').innerHTML = (profile.badges || []).map(b => `
                <div style="text-align:center;padding:16px 10px;border-radius:12px;border:1px solid var(--border);background:${b.earned ? 'rgba(196,112,75,.08)' : 'var(--card)'};opacity:${b.earned ? 1 : .55};${b.earned ? 'animation:badgePop .5s ease' : ''}">
                    <iconify-icon icon="${esc(b.icon)}" width="30" style="color:${b.earned ? 'var(--terracotta)' : 'var(--text-muted)'}"></iconify-icon>
                    <div style="font-family:var(--font-h);font-weight:600;font-size:.85rem;margin-top:6px">${esc(b.name)}</div>
                    <div style="font-size:.7rem;color:var(--text-muted)">${b.earned ? 'Unlocked' : esc(b.description)}</div>
                </div>`).join('');
            if (window.Skeletons) Skeletons.clear('badgesGrid');

            let orders;
            try {
                orders = await (await API.authFetch('/api/user/orders')).json();
            } catch (e) {
                // Network error (401 already redirects via authFetch) — don't strand skeletons.
                if (window.Skeletons) { Skeletons.clear('statsGrid'); Skeletons.clear('orders'); }
                document.getElementById('orders').innerHTML = '<p style="text-align:center;color:var(--text-muted)">Could not load your orders. Please refresh.</p>';
                return;
            }
            // Render the stat cards now that coins + order totals are known.
            const _spent = orders.reduce((a, b) => a + b.currency_paid, 0);
            document.getElementById('statsGrid').innerHTML =
                `<div class="stat coins"><h4>Coins</h4><span>${esc(profile.coins)}</span></div>`
                + `<div class="stat"><h4>Orders</h4><span>${orders.length}</span></div>`
                + `<div class="stat"><h4>Spent</h4><span>₹${_spent}</span></div>`;
            if (window.Skeletons) Skeletons.clear('statsGrid');

            const cont = document.getElementById('orders');
            if (!orders.length) { cont.innerHTML = '<p style="text-align:center;color:var(--text-muted)">No orders yet.</p>'; if (window.Skeletons) Skeletons.clear('orders'); return; }

            cont.innerHTML = orders.map(o => {
                const itemsHtml = o.items.map(i => `${esc(i.name)} (x${i.quantity})`).join(', ');
                const firstItem = o.items[0] ? o.items[0].name : '';
                const showReview = o.status === 'Completed';
                return `<div class="order" data-oid="${o.order_id}">
                    <div class="order-head"><h3>Order #${o.order_id}</h3><div style="display:flex;align-items:center;gap:10px"><span class="${statusBadgeClass(o.status)}">${esc(o.status)}</span><span style="font-size:.8rem;color:var(--text-muted)">${esc(o.date_time)}</span></div></div>
                    <div class="order-body">
                        <div class="tracker">${trackerHtml(o.status)}</div>
                        <p style="font-size:.875rem;color:var(--text-muted)"><strong>Items:</strong> ${itemsHtml}<br><strong>Total Paid:</strong> ₹${o.currency_paid} ${o.coins_used > 0 ? '(+ ' + o.coins_used + ' coins)' : ''}</p>
                        <div class="review-form" id="rev-${o.order_id}">
                            <p style="font-weight:600;margin-bottom:10px">Rate this order:</p>
                            <div class="stars-input" data-oid="${o.order_id}" data-item="${esc(firstItem)}" data-rating="0">
                                ${[1,2,3,4,5].map(v => `<span class="star" data-val="${v}">&#9734;</span>`).join('')}
                            </div>
                            <textarea placeholder="Leave a comment (optional)" rows="2"></textarea>
                            <button class="btn submit-review">Submit Review</button>
                        </div>
                        <button class="btn review-toggle" style="margin-top:15px;font-size:.8rem;display:${showReview ? 'inline-flex' : 'none'}" onclick="document.getElementById('rev-${o.order_id}').style.display='block'; this.style.display='none'">Write a Review</button>
                        ${o.status === 'Pending' ? `<button class="btn cancel-order" style="margin-top:15px;margin-left:8px;font-size:.8rem;background:#dc3545" onclick="cancelMyOrder(${o.order_id})">Cancel Order</button>` : ''}
                    </div>
                </div>`;
            }).join('');
            if (window.Skeletons) Skeletons.clear('orders');

            // Fixed star rating: each star is its own element with a value.
            document.querySelectorAll('.stars-input').forEach(starDiv => {
                const stars = [...starDiv.querySelectorAll('.star')];
                function paint(n) { stars.forEach((s, i) => { const on = i < n; s.classList.toggle('filled', on); s.innerHTML = on ? '&#9733;' : '&#9734;'; }); }
                stars.forEach(star => {
                    star.addEventListener('mouseover', () => paint(parseInt(star.dataset.val)));
                    star.addEventListener('click', () => { starDiv.dataset.rating = star.dataset.val; paint(parseInt(star.dataset.val)); });
                });
                starDiv.addEventListener('mouseleave', () => paint(parseInt(starDiv.dataset.rating) || 0));
            });

            document.querySelectorAll('.submit-review').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const form = btn.closest('.review-form');
                    const starDiv = form.querySelector('.stars-input');
                    const rating = parseInt(starDiv.dataset.rating) || 0;
                    if (rating < 1) {
                        form.insertAdjacentHTML('beforeend', '<p style="color:#dc3545;font-size:.8rem;margin-top:8px" class="rev-err">Please pick a star rating first.</p>');
                        setTimeout(function(){ var e = form.querySelector('.rev-err'); if(e) e.remove(); }, 3000);
                        return;
                    }
                    const comment = form.querySelector('textarea').value;
                    const oid = starDiv.dataset.oid;
                    const item = starDiv.dataset.item;
                    // Optimistic: show success immediately, roll back on failure.
                    const originalHTML = form.innerHTML;
                    form.innerHTML = '<p style="color:#28a745;font-weight:600;animation:badgePop .4s ease">Thanks for your review!</p>';
                    try {
                        const res = await API.authFetch(`/api/user/orders/${oid}/review`, { method: 'POST', json: { item, rating, comment } });
                        if (!res.ok) throw new Error('fail');
                    } catch (e) {
                        // Roll back — restore the form and show error
                        form.innerHTML = originalHTML;
                        form.insertAdjacentHTML('beforeend', '<p style="color:#dc3545;font-size:.8rem;margin-top:8px">Could not submit review. Please try again.</p>');
                    }
                });
            });

            connectOrderStream();  // push status updates live (SSE) — no refresh needed
        }

        // ---- Live order tracking via short polling (free-tier friendly, no held connections) ----
        let _pollTimer = null;
        let _lastStatuses = {};
        function connectOrderStream() {
            if (!(window.API && API.getAccess())) return;
            // Snapshot the initial state so we only animate real changes.
            document.querySelectorAll('.order[data-oid]').forEach(card => {
                const pill = card.querySelector('.ostatus');
                if (pill) _lastStatuses[card.dataset.oid] = pill.textContent;
            });
            // Show live indicator.
            const heading = document.getElementById('orderHistoryHeading');
            if (heading && !document.getElementById('liveHint')) {
                heading.insertAdjacentHTML('beforeend', ' <span id="liveHint" class="live-indicator"><span class="live-dot"></span> Live</span>');
            }
            startPolling();
        }
        function startPolling() {
            stopPolling();
            _pollTimer = setInterval(pollOrders, 5000);
        }
        function stopPolling() { if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; } }
        async function pollOrders() {
            try {
                const res = await API.authFetch('/api/user/orders');
                if (!res || !res.ok) return;
                const orders = await res.json();
                (orders || []).forEach(o => {
                    const prev = _lastStatuses[String(o.order_id)];
                    if (prev !== o.status) {
                        _lastStatuses[String(o.order_id)] = o.status;
                        applyStatus(o.order_id, o.status);
                    }
                });
            } catch (e) { /* silent — retry next tick */ }
        }
        // Pause polling when tab is hidden to save battery/bandwidth.
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopPolling(); else startPolling();
        });
        function applyStatus(oid, status) {
            const card = document.querySelector('.order[data-oid="' + oid + '"]');
            if (!card) return;
            const pill = card.querySelector('.ostatus');
            if (pill) { pill.textContent = status; pill.className = statusBadgeClass(status); }
            const tracker = card.querySelector('.tracker');
            if (tracker) tracker.innerHTML = trackerHtml(status);
            if (status === 'Completed') {
                const toggle = card.querySelector('.review-toggle');
                const form = card.querySelector('.review-form');
                if (toggle && (!form || form.style.display !== 'block')) toggle.style.display = 'inline-flex';
            }
            if (status !== 'Pending') {
                // Once an order leaves Pending it can no longer be cancelled by the customer.
                const cbtn = card.querySelector('.cancel-order');
                if (cbtn) cbtn.remove();
            }
        }

        // ---- Customer cancels their own still-pending order ----
        async function cancelMyOrder(oid) {
            if (!confirm('Cancel order #' + oid + '? Any coins you used will be refunded.')) return;
            const card = document.querySelector('.order[data-oid="' + oid + '"]');
            const btn = card ? card.querySelector('.cancel-order') : null;
            if (btn) { btn.disabled = true; btn.textContent = 'Cancelling…'; }
            try {
                const res = await API.authFetch('/api/user/orders/' + oid + '/cancel', { method: 'POST' });
                const d = await res.json().catch(() => ({}));
                if (res.ok && d.success) {
                    _lastStatuses[String(oid)] = 'Cancelled';
                    applyStatus(oid, 'Cancelled');
                } else {
                    if (btn) { btn.disabled = false; btn.textContent = 'Cancel Order'; }
                    alert(d.message || 'Could not cancel this order.');
                }
            } catch (e) {
                if (btn) { btn.disabled = false; btn.textContent = 'Cancel Order'; }
                alert('Network error while cancelling.');
            }
        }

        window.addEventListener('beforeunload', () => { stopPolling(); });
        document.getElementById('logoutBtn').addEventListener('click', () => API.logout());
        init();
    </script>
</body>
</html>
