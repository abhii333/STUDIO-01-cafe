name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run quick import smoke-check
      run: |
        python - <<'PY'
import importlib, sys
mods = ['flask','flask_sqlalchemy']
for m in mods:
    importlib.import_module(m)
print('Imports OK')
PY
    - name: Run tests
      run: |
        python -m pytest -q
