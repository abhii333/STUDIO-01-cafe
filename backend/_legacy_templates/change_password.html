<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — STUDIO 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#FAF7F2;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#2C2420}
        .card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.05);max-width:420px;width:94%;text-align:center}
        h1{font-family:'Syne',sans-serif;margin-bottom:20px}
        input{width:100%;padding:12px;margin-bottom:12px;border:1px solid #E8E0D6;border-radius:8px;box-sizing:border-box;font-family:inherit}
        button{width:100%;padding:14px;background:#C4704B;color:#fff;border:none;border-radius:999px;font-weight:600;cursor:pointer;font-family:inherit}
        a{color:#C4704B;text-decoration:none;font-size:.9rem;display:block;margin-top:12px}
        .flash-message{margin-top:-8px}
        .flash-message.error{color:#D32F2F}
        .flash-message.success{color:#388E3C}
    </style>
</head>
<body>
    <div class="card">
        <h1>Change Password</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <p class="flash-message {{ 'error' if category == 'error' else 'success' }}">{{ message }}</p>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <input type="password" name="current_password" placeholder="Current Password" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <button type="submit">Update Password</button>
        </form>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
